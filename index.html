<!doctype html><html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0" /><title>복기노트</title><meta name="apple-mobile-web-app-capable" content="yes" /><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /><meta name="apple-mobile-web-app-title" content="복기노트" /><meta name="mobile-web-app-capable" content="yes" /><meta name="theme-color" content="#0b0e14" /><link rel="manifest" href="manifest.webmanifest" /><link rel="apple-touch-icon" href="apple-touch-icon.png" /><link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" /><link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" /><style>:root {
  --bg: #0b0e14;
  --bg-elevated: #12161f;
  --bg-input: #161b26;
  --panel-border: #1f2430;
  --text: #e8eaf0;
  --text-dim: #8b92a3;
  --text-faint: #565d6e;
  --accent: #f0b429;
  --accent-dim: #8a6a1f;
  --long: #22c55e;
  --long-dim: #163d25;
  --short: #ef4444;
  --short-dim: #401c1c;
  --radius-sm: 6px;
  --radius-md: 10px;
  --font-display: 'Pretendard', -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  --font-body: 'Pretendard', -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  --font-mono: 'Consolas', 'SF Mono', ui-monospace, 'Menlo', monospace;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  max-width: 100%;
  overflow-x: hidden;
}

#root {
  min-height: 100vh;
  max-width: 100%;
  overflow-x: hidden;
}

* {
  min-width: 0;
}

button {
  font-family: inherit;
  cursor: pointer;
}

input,
select,
textarea {
  font-family: inherit;
  color: var(--text);
  background: var(--bg-input);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
}

input:focus,
select:focus,
textarea:focus,
button:focus-visible {
  outline: 2px solid var(--accent-dim);
  outline-offset: 1px;
}

::selection {
  background: var(--accent-dim);
}

a {
  color: var(--accent);
}

::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #232938;
  border-radius: 8px;
}
::-webkit-scrollbar-thumb:hover {
  background: #2c3344;
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
/* ===== layout shell ===== */
.app-shell {
  max-width: 1080px;
  margin: 0 auto;
  padding: 28px 24px 80px;
}

.app-header {
  margin-bottom: 22px;
}

.app-header__title {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.logo-mark {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--short);
  animation: blink-rec 2.4s ease-in-out infinite;
}

@keyframes blink-rec {
  0%, 60% { opacity: 1; }
  80% { opacity: 0.25; }
  100% { opacity: 1; }
}

.app-header h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  margin: 0;
  letter-spacing: -0.01em;
}

.app-header h1 .accent {
  color: var(--accent);
}

.app-header__tagline {
  margin: 4px 0 0;
  color: var(--text-dim);
  font-size: 13px;
}

.server-banner {
  background: var(--short-dim);
  border: 1px solid #5c2424;
  color: #f3b3b3;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 16px;
}
.server-banner code {
  font-family: var(--font-mono);
  background: rgba(0, 0, 0, 0.25);
  padding: 1px 5px;
  border-radius: 4px;
}

/* ===== tabs ===== */
.tab-bar {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--panel-border);
  margin-bottom: 24px;
}

.tab-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  padding: 12px 16px;
  border-bottom: 2px solid transparent;
  transition: color 0.15s ease, border-color 0.15s ease;
  min-height: 44px;
}

.tab-btn:hover {
  color: var(--text);
}

.tab-btn--active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ===== shared eyebrow / typography helpers ===== */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  text-transform: uppercase;
}

.mono {
  font-family: var(--font-mono);
}

.dot-sep {
  color: var(--text-faint);
  margin: 0 2px;
}

.is-pos {
  color: var(--long);
}
.is-neg {
  color: var(--short);
}

/* ===== form ===== */
.trade-form {
  background: var(--bg-elevated);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-md);
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.trade-form__header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 6px;
}

.trade-form__autoload-hint {
  font-size: 12px;
  color: var(--text-faint);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

@media (max-width: 560px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 13px;
  color: var(--text-dim);
}

.field small {
  color: var(--text-faint);
  font-weight: 400;
}

.field input,
.field select,
.field textarea {
  padding: 11px 10px;
  font-size: 16px;
  color: var(--text);
}

.field--full {
  grid-column: 1 / -1;
}

.field--readout {
  justify-content: flex-end;
}

.readout {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-family: var(--font-mono);
  padding: 9px 10px;
  background: var(--bg-input);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
}

.readout__pnl {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}
.readout__r {
  font-size: 12px;
  color: var(--text-faint);
}

/* direction toggle (long/short) */
.dir-toggle {
  display: flex;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.dir-btn {
  flex: 1;
  background: var(--bg-input);
  border: none;
  color: var(--text-dim);
  padding: 9px 0;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.15s ease, color 0.15s ease;
}

.dir-btn--long.dir-btn--active {
  background: var(--long-dim);
  color: var(--long);
}
.dir-btn--short.dir-btn--active {
  background: var(--short-dim);
  color: var(--short);
}

/* tag groups (setup type / emotion / mistakes) */
.tag-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag-btn {
  background: var(--bg-input);
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 999px;
  transition: all 0.12s ease;
}

.tag-btn:hover {
  border-color: var(--accent-dim);
}

.tag-btn--active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: #fff3d6;
}

.trade-form__actions {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}

.btn {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
}

.btn--primary {
  background: var(--accent);
  color: #221a05;
}
.btn--primary:hover {
  background: #f5c34f;
}

.btn--ghost {
  background: transparent;
  border-color: var(--panel-border);
  color: var(--text-dim);
}
.btn--ghost:hover {
  border-color: var(--text-faint);
  color: var(--text);
}

/* ===== trades view ===== */
.trades-view__toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.search-input {
  flex: 1;
  padding: 11px 12px;
  font-size: 16px;
}

.trades-view__count {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-faint);
  white-space: nowrap;
}

.trade-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.empty-state {
  color: var(--text-faint);
  font-size: 14px;
  padding: 40px 0;
  text-align: center;
  border: 1px dashed var(--panel-border);
  border-radius: var(--radius-md);
}

/* ===== trade card ===== */
.trade-card {
  background: var(--bg-elevated);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-md);
  padding: 16px 18px;
}

.trade-card__top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.trade-card__id {
  display: flex;
  align-items: center;
  gap: 8px;
}

.punch-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  display: inline-block;
}
.punch-dot--long {
  background: var(--long);
  box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
}
.punch-dot--short {
  background: var(--short);
  box-shadow: 0 0 6px rgba(239, 68, 68, 0.6);
}

.trade-card__symbol {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
}

.badge {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 600;
}
.badge--long {
  background: var(--long-dim);
  color: var(--long);
}
.badge--short {
  background: var(--short-dim);
  color: var(--short);
}

.trade-card__pnl {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.pnl-pct {
  font-family: var(--font-mono);
  font-size: 17px;
  font-weight: 600;
}
.pnl-r {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
}

.trade-card__meta {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-dim);
}

.timecode {
  color: var(--text-faint);
}

.trade-card__tags {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.pill {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--bg-input);
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
}
.pill--emotion {
  color: var(--accent);
  border-color: var(--accent-dim);
}
.pill--plan-ok {
  color: var(--long);
  border-color: #1f5733;
}
.pill--plan-bad {
  color: var(--short);
  border-color: #5c2424;
}
.pill--mistake {
  color: #f3b3b3;
  border-color: #5c2424;
  background: var(--short-dim);
}

.trade-card__chart-wrap {
  margin-top: 14px;
}

.chart-legend {
  display: flex;
  gap: 14px;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
  font-family: var(--font-mono);
}

.legend-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  margin-right: 4px;
}
.legend-dot--entry {
  background: var(--accent);
}
.legend-dot--stop {
  background: var(--short);
}
.legend-dot--exit {
  background: var(--long);
}

.trade-card__notes {
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.55;
  border-top: 1px solid var(--panel-border);
  padding-top: 10px;
}
.trade-card__notes p {
  margin: 4px 0;
}
.trade-card__notes strong {
  color: var(--text-faint);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-right: 4px;
}

.trade-card__actions {
  display: flex;
  gap: 14px;
  margin-top: 12px;
}

.link-btn {
  background: none;
  border: none;
  color: var(--text-faint);
  font-size: 12px;
  padding: 0;
}
.link-btn:hover {
  color: var(--text);
}
.link-btn--danger:hover {
  color: var(--short);
}

/* ===== chart ===== */
.trade-chart {
  position: relative;
  height: 320px;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  background: #0d1018;
  overflow: hidden;
}

.trade-chart__canvas {
  width: 100%;
  height: 100%;
}

.trade-chart__overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-faint);
  background: rgba(11, 14, 20, 0.85);
  text-align: center;
  padding: 0 20px;
}

.trade-chart__overlay--error {
  color: #f3b3b3;
}

.trade-chart__error-detail {
  font-size: 11px;
  color: var(--text-faint);
  max-width: 320px;
}

.trade-chart__meta {
  position: absolute;
  bottom: 8px;
  left: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
}

/* ===== screenshot attachments ===== */
.screenshots {
  margin-top: 14px;
}

.screenshots__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.screenshots__header .link-btn {
  font-size: 12px;
  color: var(--accent);
}
.screenshots__header .link-btn:disabled {
  color: var(--text-faint);
  cursor: default;
}

.screenshots__grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
  gap: 8px;
}

.screenshot-thumb {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--panel-border);
  background: var(--bg-input);
}

.screenshot-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  cursor: pointer;
}

.screenshot-thumb__remove {
  position: absolute;
  top: 3px;
  right: 3px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: none;
  background: rgba(11, 14, 20, 0.75);
  color: #fff;
  font-size: 15px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screenshot-viewer {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.92);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.screenshot-viewer img {
  max-width: 100%;
  max-height: 100%;
  border-radius: var(--radius-sm);
}

.tape-scan {
  width: 120px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 2px;
  animation: tape-scan-move 1.1s ease-in-out infinite;
}

@keyframes tape-scan-move {
  0% {
    transform: translateX(-60px);
    opacity: 0.3;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateX(60px);
    opacity: 0.3;
  }
}

/* ===== stats view ===== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 26px;
}

@media (max-width: 640px) {
  .stat-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

.stat-tile {
  background: var(--bg-elevated);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-tile__value {
  font-family: var(--font-mono);
  font-size: 19px;
  font-weight: 600;
}

.stat-tile--pos .stat-tile__value {
  color: var(--long);
}
.stat-tile--neg .stat-tile__value {
  color: var(--short);
}

.stat-tile__label {
  font-size: 11px;
  color: var(--text-faint);
}

.stats-section {
  margin-bottom: 22px;
}

.stats-section h3 {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--text-dim);
  margin: 0 0 10px;
  font-weight: 600;
}

.bar-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
}

.bar-row__label {
  flex: 1;
  color: var(--text);
}
.bar-row__count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
}
.bar-row__pnl {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  min-width: 70px;
  text-align: right;
}

/* ===== win rate trend ===== */
.winrate-trend__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.winrate-trend__header h3 {
  margin: 0;
}

.period-toggle {
  display: flex;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.period-toggle__btn {
  background: var(--bg-input);
  border: none;
  color: var(--text-dim);
  font-size: 12px;
  padding: 6px 10px;
  font-family: var(--font-display);
  font-weight: 600;
}
.period-toggle__btn--active {
  background: var(--accent-dim);
  color: #fff3d6;
}

.winrate-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 10px;
  align-items: center;
}
.winrate-row__rate {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  min-width: 38px;
  text-align: right;
}
.winrate-row__change {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  min-width: 56px;
  text-align: right;
  color: var(--text-faint);
}

/* ===== footer ===== */
.app-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  gap: 22px;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: rgba(11, 14, 20, 0.92);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--panel-border);
}

.app-footer .link-btn {
  font-size: 12px;
  color: var(--text-faint);
  min-height: 30px;
}
.app-footer .link-btn:hover {
  color: var(--text-dim);
}

/* ===== section tabs (매매복기 vs 팁노트) ===== */
.section-tab-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}
.section-tab {
  background: var(--bg-elevated);
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  padding: 10px 18px;
  border-radius: 999px;
}
.section-tab--active {
  background: var(--accent);
  border-color: var(--accent);
  color: #221a05;
}

/* ===== bulk entry table (표 모드) ===== */
.bulk-entry {
  background: var(--bg-elevated);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-md);
  padding: 22px;
}

.bulk-entry__header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}

.bulk-entry__header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.bulk-input--symbol-wrap {
  position: relative;
  display: block;
}

.android-badge {
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 12px;
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: help;
}

.bulk-entry__hint {
  font-size: 12px;
  color: var(--text-faint);
}

.bulk-table {
  overflow-x: auto;
}

.bulk-table__head,
.bulk-table__row {
  display: grid;
  grid-template-columns: 90px 70px 110px 110px 100px 70px 80px 90px 190px 190px 90px 32px;
  gap: 8px;
  align-items: center;
}

.bulk-table__head {
  font-size: 11px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.03em;
  padding: 0 2px 8px;
  min-width: 1280px;
}

.bulk-table__row {
  padding: 6px 2px;
  border-bottom: 1px solid var(--panel-border);
  min-width: 1280px;
}

.bulk-input {
  width: 100%;
  padding: 7px 8px;
  font-size: 13px;
  border-radius: var(--radius-sm);
}

.bulk-input--symbol {
  font-weight: 600;
}

.bulk-input--narrow {
  min-width: 0;
}

.bulk-input--time {
  font-family: var(--font-mono);
  font-size: 12px;
}

.bulk-table__pnl {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  text-align: right;
}

.bulk-table__margin {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-faint);
  text-align: right;
}

.bulk-table__remove {
  background: none;
  border: none;
  color: var(--text-faint);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
}
.bulk-table__remove:hover {
  color: var(--short);
}

.bulk-entry__actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.btn--small {
  font-size: 12px;
  padding: 6px 12px;
}

/* ===== trade card edit mode ===== */
.trade-card__edit {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.trade-card__edit-actions {
  display: flex;
  gap: 10px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
}

/* ===== reflection export ===== */
.reflection-export__hint {
  font-size: 12px;
  color: var(--text-faint);
  margin: -4px 0 12px;
}

.reflection-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.reflection-item {
  background: var(--bg-elevated);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
}

.reflection-item__head {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-faint);
  margin-bottom: 4px;
}

.reflection-item p {
  margin: 0;
  color: var(--text-dim);
}

.reflection-list__more {
  font-size: 12px;
  color: var(--text-faint);
  text-align: center;
  margin: 4px 0 0;
}

/* ===== tip card ===== */
.tip-number {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  font-weight: 700;
}

.pill--source {
  color: var(--text-dim);
  border-color: var(--panel-border);
}

.tip-card__content {
  margin: 10px 0;
  font-size: 14px;
  color: var(--text);
  line-height: 1.55;
  white-space: pre-wrap;
}

@media (max-width: 900px) {
  .bulk-table__head,
  .bulk-table__row {
    grid-template-columns: 80px 60px 95px 95px 85px 60px 70px 80px 175px 175px 80px 28px;
  }
}

/* ===== extra orders (추가 주문 내역) ===== */
.trade-card__margin-hint {
  color: var(--text-faint);
  font-size: 11px;
}
  padding-top: 12px;
}

.extra-orders--view {
  margin-top: 10px;
}

.extra-orders__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.field-label {
  font-size: 13px;
  color: var(--text-dim);
}
.field-label small {
  color: var(--text-faint);
  font-weight: 400;
}

.extra-orders__empty {
  font-size: 12px;
  color: var(--text-faint);
  margin: 4px 0 8px;
}

.extra-orders__list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.extra-order-row__size {
  padding: 7px 8px;
  font-size: 13px;
  border-radius: var(--radius-sm);
}

.extra-order-view-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px 8px;
  font-size: 12px;
  color: var(--text-dim);
  max-width: 100%;
  min-width: 0;
  padding: 4px 0;
}

.extra-order-row__type {
  padding: 7px 6px;
  font-size: 13px;
  border-radius: var(--radius-sm);
}

.extra-order-row__price,
.extra-order-row__memo {
  padding: 7px 8px;
  font-size: 13px;
  border-radius: var(--radius-sm);
}

.extra-order-row__time {
  padding: 7px 6px;
  font-size: 12px;
  font-family: var(--font-mono);
  border-radius: var(--radius-sm);
}

.extra-order-row__remove {
  background: none;
  border: none;
  color: var(--text-faint);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
}
.extra-order-row__remove:hover { color: var(--short); }

.extra-order-row__type-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
}
.extra-order-row__type-badge--buy {
  background: var(--long-dim);
  color: var(--long);
}
.extra-order-row__type-badge--sell {
  background: var(--short-dim);
  color: var(--short);
}

.extra-order-row__memo-view {
  color: var(--text-faint);
  font-size: 11px;
  word-break: break-word;
  overflow-wrap: anywhere;
  min-width: 0;
  flex: 1 1 100%;
}

/* ===== DateTimeInput ===== */
.dt-input {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg-input);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 4px 6px;
}

.dt-seg {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  text-align: center;
  padding: 2px 0;
  outline: none;
}
.dt-seg:focus {
  background: var(--accent-dim);
  border-radius: 3px;
}
.dt-seg--y  { width: 36px; }
.dt-seg--mo { width: 22px; }
.dt-seg--d  { width: 22px; }
.dt-seg--h  { width: 22px; }
.dt-seg--mi { width: 22px; }
.dt-seg--s  { width: 22px; }

.dt-sep {
  color: var(--text-faint);
  font-family: var(--font-mono);
  font-size: 12px;
  user-select: none;
}

/* ===== 실손익 표시 ===== */
.pnl-usdt {
  font-family: var(--font-mono);
  font-size: 11px;
  margin-top: 2px;
}

/* ===== 추가 주문 컬럼 헤더 ===== */
.extra-orders__col-head {
  display: grid;
  grid-template-columns: 90px 100px 100px 100px 60px 180px 140px 28px;
  gap: 8px;
  font-size: 10px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0 2px 4px;
  margin-top: 6px;
  min-width: 720px;
}

.extra-order-row {
  display: grid;
  grid-template-columns: 90px 100px 100px 100px 60px 180px 140px 28px;
  gap: 8px;
  align-items: center;
  min-width: 720px;
}

.extra-order-row__leverage {
  font-size: 12px;
  color: var(--text-faint);
  text-align: center;
}

/* ===== 스탑로스 토글 ===== */
.stoploss-toggle {
  display: flex;
  gap: 8px;
}

.stoploss-btn {
  background: var(--bg-input);
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  transition: all 0.12s ease;
}

.stoploss-btn--active.stoploss-btn--ok {
  background: var(--long-dim);
  border-color: var(--long);
  color: var(--long);
}
.stoploss-btn--active.stoploss-btn--no {
  background: var(--short-dim);
  border-color: var(--short);
  color: var(--short);
}
.stoploss-btn--active.stoploss-btn--partial {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: #fff3d6;
}

/* 스탑로스 pill */
.pill--stoploss { font-weight: 700; }
.pill--stoploss-ok { color: var(--long); border-color: #1f5733; }
.pill--stoploss-no { color: var(--short); border-color: #5c2424; }
.pill--stoploss-partial { color: var(--accent); border-color: var(--accent-dim); }

/* ===== 폰 동기화 관련 ===== */
.sync-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.sync-badge {
  background: var(--short);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 999px;
  line-height: 1.4;
}
.pill--synced-pc {
  color: #4a7fa5;
  border-color: #2a3f55;
  font-size: 10px;
}
.pnl-usdt {
  white-space: nowrap;
}

/* ===== 거래 정보 수정 그리드 ===== */
.edit-core-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 8px;
}
.edit-core-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 11px;
  color: var(--text-faint);
}
.edit-core-field input,
.edit-core-field select {
  padding: 8px 10px;
  font-size: 14px;
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  border: 1px solid var(--panel-border);
  color: var(--text);
}
.edit-core-hint {
  font-size: 11px;
  color: var(--text-faint);
  margin: 8px 0 0;
}
@media (max-width: 600px) {
  .edit-core-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

</script><script>const DB_NAME='bokgi-note-ios',DB_VERSION=1,STORE='trades';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'})};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,9)}
function mg(t){const m={...t};if(!Array.isArray(m.setupTypes))m.setupTypes=m.setupType?[m.setupType]:[];if(!Array.isArray(m.emotions))m.emotions=m.emotion?[m.emotion]:[];if(!m.mistakeAnalysis)m.mistakeAnalysis='';if(!m.nextPlan)m.nextPlan='';if(!m.stopLoss)m.stopLoss='';if(!m.extraOrders)m.extraOrders=[];if(m.synced===undefined)m.synced=false;return m}
window.TradeStore={
  async getAll(){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),req=tx.objectStore(STORE).getAll();req.onsuccess=()=>{const rows=(req.result||[]).map(mg);rows.sort((a,b)=>new Date(b.entryTime||0)-new Date(a.entryTime||0));res(rows)};req.onerror=()=>rej(req.error)})},
  async add(t){const db=await openDB();const r=mg({id:uid(),createdAt:new Date().toISOString(),synced:false,...t});return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).add(r);tx.oncomplete=()=>res(r);tx.onerror=()=>rej(tx.error)})},
  async addBulk(items){const db=await openDB();const records=items.map(i=>mg({id:uid(),createdAt:new Date().toISOString(),synced:false,...i}));return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite'),s=tx.objectStore(STORE);records.forEach(r=>s.add(r));tx.oncomplete=()=>res(records);tx.onerror=()=>rej(tx.error)})},
  async update(id,patch){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite'),s=tx.objectStore(STORE),req=s.get(id);req.onsuccess=()=>{if(!req.result){rej(new Error('not found'));return}const u=mg({...req.result,...patch,id});s.put(u);tx.oncomplete=()=>res(u)};req.onerror=()=>rej(req.error)})},
  async remove(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=()=>res(true);tx.onerror=()=>rej(tx.error)})},

  // 내보내기: 전체 or 아직 안 옮긴 것만
  async exportJSON(onlyUnsynced=false){
    const rows=await window.TradeStore.getAll();
    const target=onlyUnsynced?rows.filter(r=>!r.synced):rows;
    if(target.length===0)return null; // 내보낼 게 없음
    return JSON.stringify({source:'bokgi-note-ios',exportedAt:new Date().toISOString(),trades:target},null,2);
  },

  // 내보낸 항목들을 synced=true로 표시
  async markSynced(ids){
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction(STORE,'readwrite'),s=tx.objectStore(STORE);
      ids.forEach(id=>{const req=s.get(id);req.onsuccess=()=>{if(req.result)s.put({...req.result,synced:true})}});
      tx.oncomplete=()=>res(true);tx.onerror=()=>rej(tx.error);
    });
  },

  // 가져오기: id 중복 체크해서 새 것만 추가
  async importJSON(text){
    const p=JSON.parse(text);
    let rows=Array.isArray(p)?p
      :Array.isArray(p.trades)?p.trades
      :Array.isArray(p.memos)?p.memos.map(m=>({...m,reasoning:m.note||'',emotions:m.emotion?[m.emotion]:[]}))
      :null;
    if(!rows)throw new Error('지원하지 않는 형식');

    const db=await openDB();

    // 기존 id 목록 조회
    const existing=await new Promise((res,rej)=>{
      const tx=db.transaction(STORE,'readonly'),req=tx.objectStore(STORE).getAllKeys();
      req.onsuccess=()=>res(new Set(req.result));
      req.onerror=()=>rej(req.error);
    });

    // 중복 제거: 이미 있는 id는 건너뜀
    const newRows=rows.filter(r=>r.id&&!existing.has(r.id));
    const noIdRows=rows.filter(r=>!r.id); // id 없는 건 새 id 생성해서 추가

    const toAdd=[
      ...newRows.map(r=>mg({...r,synced:true})), // 가져온 건 synced=true
      ...noIdRows.map(r=>mg({...r,id:uid(),synced:true})),
    ];

    if(toAdd.length===0)return{added:0,skipped:rows.length};

    return new Promise((res,rej)=>{
      const tx=db.transaction(STORE,'readwrite'),s=tx.objectStore(STORE);
      toAdd.forEach(r=>s.put(r));
      tx.oncomplete=()=>res({added:toAdd.length,skipped:rows.length-toAdd.length});
      tx.onerror=()=>rej(tx.error);
    });
  },
};

const TIP_DB = 'bokgi-tips-ios', TIP_STORE = 'tips';
function openTipDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(TIP_DB, 1);
    r.onupgradeneeded = () => { const db = r.result; if (!db.objectStoreNames.contains(TIP_STORE)) db.createObjectStore(TIP_STORE, {keyPath:'id'}); };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
window.TipStore = {
  async getAll() {
    const db = await openTipDB();
    return new Promise((res, rej) => {
      const req = db.transaction(TIP_STORE,'readonly').objectStore(TIP_STORE).getAll();
      req.onsuccess = () => { const rows = req.result||[]; rows.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)); res(rows); };
      req.onerror = () => rej(req.error);
    });
  },
  async add(tip) {
    const db = await openTipDB();
    const r = { id: uid(), createdAt: new Date().toISOString(), ...tip };
    return new Promise((res, rej) => { const tx = db.transaction(TIP_STORE,'readwrite'); tx.objectStore(TIP_STORE).add(r); tx.oncomplete = () => res(r); tx.onerror = () => rej(tx.error); });
  },
  async update(id, patch) {
    const db = await openTipDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(TIP_STORE,'readwrite'), s = tx.objectStore(TIP_STORE), req = s.get(id);
      req.onsuccess = () => { if (!req.result) { rej(new Error('not found')); return; } const u = {...req.result,...patch,id}; s.put(u); tx.oncomplete = () => res(u); };
      req.onerror = () => rej(req.error);
    });
  },
  async remove(id) {
    const db = await openTipDB();
    return new Promise((res, rej) => { const tx = db.transaction(TIP_STORE,'readwrite'); tx.objectStore(TIP_STORE).delete(id); tx.oncomplete = () => res(true); tx.onerror = () => rej(tx.error); });
  },
  async importJSON(items) {
    const db = await openTipDB();
    const existing = await new Promise((res,rej) => { const req = db.transaction(TIP_STORE,'readonly').objectStore(TIP_STORE).getAllKeys(); req.onsuccess = () => res(new Set(req.result)); req.onerror = () => rej(req.error); });
    const toAdd = items.filter(t => t.id && !existing.has(t.id));
    const noId = items.filter(t => !t.id).map(t => ({...t, id: uid()}));
    const all = [...toAdd, ...noId];
    if (all.length === 0) return { added: 0, skipped: items.length };
    return new Promise((res, rej) => { const tx = db.transaction(TIP_STORE,'readwrite'), s = tx.objectStore(TIP_STORE); all.forEach(t => s.put(t)); tx.oncomplete = () => res({ added: all.length, skipped: items.length - all.length }); tx.onerror = () => rej(tx.error); });
  },
};
</script><script>// OKX 공개 API 클라이언트 - 아이폰 Safari 최적화 버전
// 직접 호출 → corsproxy.io → allorigins.win 순서로 시도
// 타임아웃을 짧게 잡아서 빠르게 다음 프록시로 넘어감

const OKX_BASE = 'https://www.okx.com';

function proxyUrls(targetUrl) {
  return [
    targetUrl,
    'https://corsproxy.io/?url=' + encodeURIComponent(targetUrl),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl),
  ];
}

async function fetchJsonWithFallback(targetUrl, timeoutMs) {
  timeoutMs = timeoutMs || 6000;
  const attempts = proxyUrls(targetUrl);
  var lastError = null;
  for (var i = 0; i < attempts.length; i++) {
    var url = attempts[i];
    try {
      var controller = new AbortController();
      var timer = setTimeout(function() { controller.abort(); }, timeoutMs);
      var res = await fetch(url, { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) {
        lastError = new Error('HTTP ' + res.status + ' (' + url.slice(0, 40) + ')');
        continue;
      }
      var data = await res.json();
      return data;
    } catch (err) {
      lastError = err;
      continue;
    }
  }
  throw lastError || new Error('OKX에 연결할 수 없어요');
}

var BAR_MAP = { '1m': '1m', '5m': '5m', '15m': '15m', '1h': '1H', '4h': '4H', '1d': '1Dutc' };
var BAR_SECONDS = { '1m': 60, '5m': 300, '15m': 900, '1h': 3600, '4h': 14400, '1d': 86400 };

function toInstId(symbolRaw) {
  var s = ((symbolRaw || 'BTC') + '').trim().toUpperCase();
  s = s.replace(/USDT$/, '-USDT').replace(/--/g, '-');
  if (s.indexOf('-') < 0) s = s + '-USDT';
  if (!s.endsWith('-SWAP')) s = s + '-SWAP';
  return s;
}

function normalizeCandles(rows) {
  return rows.map(function(r) {
    return {
      time: Math.floor(Number(r[0]) / 1000),
      open: Number(r[1]),
      high: Number(r[2]),
      low: Number(r[3]),
      close: Number(r[4]),
      volume: Number(r[5]),
    };
  }).sort(function(a, b) { return a.time - b.time; });
}

window.OkxClient = {
  toInstId: toInstId,

  getCandles: async function(opts) {
    var symbol = opts.symbol, timeframe = opts.timeframe || '15m';
    var entryTime = opts.entryTime, exitTime = opts.exitTime;
    var instId = toInstId(symbol);
    var bar = BAR_MAP[timeframe] || '15m';
    var barSeconds = BAR_SECONDS[timeframe] || 900;

    var entryMs = entryTime ? new Date(entryTime).getTime() : Date.now();
    var exitMs = exitTime ? new Date(exitTime).getTime() : entryMs;
    var padCandles = 40;
    var windowStartMs = Math.min(entryMs, exitMs) - padCandles * barSeconds * 1000;
    var windowEndMs = Math.max(entryMs, exitMs) + padCandles * barSeconds * 1000;
    var nowMs = Date.now();
    var isRecent = nowMs - windowStartMs < barSeconds * 1000 * 1440 * 0.9;

    var candles = [];

    if (isRecent) {
